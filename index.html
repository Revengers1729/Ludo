<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo King Clone - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK (Compat Version for CDN usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="setup-screen" class="screen">
        <div class="menu-box">
            <h1 class="game-title">LUDO KING</h1>
            <div class="input-group">
                <label for="player-count">Players Count:</label>
                <select id="player-count">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                </select>
            </div>
            <div class="input-group">
                <label for="game-mode">Game Mode:</label>
                <select id="game-mode">
                    <option value="pass-play">Pass & Play (Local)</option>
                    <option value="vs-bot">Vs Computer (Smart Bot)</option>
                </select>
            </div>
            <button id="start-game-btn" class="btn-primary">START GAME</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="game-container">
            <!-- Top Controls/Status -->
            <div class="status-bar">
                <div id="current-turn-display">Turn: <span id="active-player-name" class="red-text">Red</span></div>
                <button id="restart-btn" class="btn-secondary">Main Menu</button>
            </div>

            <!-- The 15x15 Ludo Board -->
            <div class="ludo-board" id="ludo-board">
                <!-- Red Home (Top Left) -->
                <div class="home-zone red-home" style="grid-area: 1 / 1 / 7 / 7;">
                    <div class="inner-box">
                        <div class="token-slot red-slot" data-color="red" data-index="0"></div>
                        <div class="token-slot red-slot" data-color="red" data-index="1"></div>
                        <div class="token-slot red-slot" data-color="red" data-index="2"></div>
                        <div class="token-slot red-slot" data-color="red" data-index="3"></div>
                    </div>
                </div>

                <!-- Green Home (Top Right) -->
                <div class="home-zone green-home" style="grid-area: 1 / 10 / 7 / 16;">
                    <div class="inner-box">
                        <div class="token-slot green-slot" data-color="green" data-index="0"></div>
                        <div class="token-slot green-slot" data-color="green" data-index="1"></div>
                        <div class="token-slot green-slot" data-color="green" data-index="2"></div>
                        <div class="token-slot green-slot" data-color="green" data-index="3"></div>
                    </div>
                </div>

                <!-- Blue Home (Bottom Left) -->
                <div class="home-zone blue-home" style="grid-area: 10 / 1 / 16 / 7;">
                    <div class="inner-box">
                        <div class="token-slot blue-slot" data-color="blue" data-index="0"></div>
                        <div class="token-slot blue-slot" data-color="blue" data-index="1"></div>
                        <div class="token-slot blue-slot" data-color="blue" data-index="2"></div>
                        <div class="token-slot blue-slot" data-color="blue" data-index="3"></div>
                    </div>
                </div>

                <!-- Yellow Home (Bottom Right) -->
                <div class="home-zone yellow-home" style="grid-area: 10 / 10 / 16 / 16;">
                    <div class="inner-box">
                        <div class="token-slot yellow-slot" data-color="yellow" data-index="0"></div>
                        <div class="token-slot yellow-slot" data-color="yellow" data-index="1"></div>
                        <div class="token-slot yellow-slot" data-color="yellow" data-index="2"></div>
                        <div class="token-slot yellow-slot" data-color="yellow" data-index="3"></div>
                    </div>
                </div>

                <!-- Center Triangle Goal -->
                <div class="center-goal" style="grid-area: 7 / 7 / 10 / 10;">
                    <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
                        <polygon points="0,0 50,50 0,100" fill="#2980b9" />
                        <polygon points="0,0 100,0 50,50" fill="#27ae60" />
                        <polygon points="100,0 100,100 50,50" fill="#f1c40f" />
                        <polygon points="0,100 100,100 50,50" fill="#c0392b" />
                    </svg>
                </div>
            </div>

            <!-- Dice Roll Area -->
            <div class="controls-panel">
                <div class="dice-wrapper">
                    <div id="dice-container" class="dice-box">
                        <span id="dice-value">⚀</span>
                    </div>
                    <p id="roll-status-text">Click dice to roll!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Effects -->
    <audio id="sound-roll" src="https://actions.google.com/sounds/v1/cartoon/slide_whistle_to_drum_roll.ogg" preload="auto"></audio>
    <audio id="sound-move" src="https://actions.google.com/sounds/v1/digital/beep.ogg" preload="auto"></audio>
    <audio id="sound-cut" src="https://actions.google.com/sounds/v1/cartoon/cartoon_cowbell.ogg" preload="auto"></audio>
    <audio id="sound-win" src="https://actions.google.com/sounds/v1/events/tada.ogg" preload="auto"></audio>

    <script src="game.js"></script>
</body>
</html>
